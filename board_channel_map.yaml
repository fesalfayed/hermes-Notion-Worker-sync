# Board-to-Channel Mapping Registry
# ===================================
# Maps kanban board slugs to their owning Discord channel IDs.
# Used by projectsFromDiscord (to populate kanban_board_slug) and
# tasksDelta/tasksBackfill (to resolve parent_project relations).
#
# Schema:
#   boards:
#     <board-slug>:
#       channel_id: "<discord-channel-snowflake>"
#       required: true|false   # If true, worker refuses to boot when channel 404s
#
# To add a new board:
#   1. Add an entry below
#   2. Rebuild: npm run build
#   3. Deploy: ntn workers deploy
#   4. Optionally backfill: ntn workers sync trigger tasksBackfill
#
# To discover mappings automatically:
#   npx tsx scripts/seed-board-map.ts
#   (Emits YAML to stdout — review before committing)

boards:
  hermes-projects-sync:
    channel_id: "1504266202506199272"
    required: true
  vta-rng:
    channel_id: "1505337506324021438"
    required: false
  ambler-drive:
    channel_id: "1506095315625705582"
    required: false
  saved-instagram-curator:
    channel_id: "1504560480671498260"
    required: false
  homerig-roboslav:
    channel_id: "1504705726948446349"
    required: false
